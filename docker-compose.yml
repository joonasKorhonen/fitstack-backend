version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    container_name: fitstack-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fitstack
      POSTGRES_PASSWORD: fitstack_dev_password
      POSTGRES_DB: fitstack
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fitstack"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fitstack-backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://fitstack:fitstack_dev_password@db:5432/fitstack
      JWT_SECRET: your-secret-key-change-in-production
      PORT: 3000
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      # For development: mount source code for hot reload
      - ./src:/app/src
      - ./prisma:/app/prisma
    command: sh -c "npx prisma migrate deploy && npm run start:prod"

volumes:
  postgres_data:
